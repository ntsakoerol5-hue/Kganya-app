<!DOCTYPE html>
<html>
<head>
    <title>Claims Management</title>
</head>
<body>

<h1>Claims Management</h1>

<form>
    <label>Claim Number</label><br>
    <input type="text"><br><br>

    <label>Member Name</label><br>
    <input type="text"><br><br>

    <label>Policy Number</label><br>
    <input type="text"><br><br>

    <label>Claim Amount (R)</label><br>
    <input type="number"><br><br>

    <label>Status</label><br>
    <select>
        <option>Pending</option>
        <option>Approved</option>
        <option>Rejected</option>
    </select><br><br>

    <button type="submit">Submit Claim</button>
</form>

<hr>

<h2>Claims List</h2>

<table border="1">
<tr>
    <th>Claim No.</th>
    <th>Member</th>
    <th>Amount</th>
    <th>Status</th>
</tr>

<tr>
    <td>CLM001</td>
    <td>Example Member</td>
    <td>R10,000</td>
    <td>Pending</td>
</tr>

</table>

</body>
  </html>
