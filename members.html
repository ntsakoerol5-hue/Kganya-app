<!DOCTYPE html>
<html>
<head>
    <title>Member & Policy Management</title>
</head>
<body>

<h1>Member & Policy Management</h1>

<form>
    <label>Full Name</label><br>
    <input type="text"><br><br>

    <label>ID Number</label><br>
    <input type="text"><br><br>

    <label>Phone Number</label><br>
    <input type="text"><br><br>

    <label>Email</label><br>
    <input type="email"><br><br>

    <label>Policy Type</label><br>
    <select>
        <option>Individual</option>
        <option>Family</option>
        <option>Extended Family</option>
    </select><br><br>

    <button type="submit">Save Member</button>
</form>

<hr>

<h2>Registered Members</h2>

<table border="1">
<tr>
    <th>Name</th>
    <th>ID Number</th>
    <th>Phone</th>
    <th>Policy</th>
</tr>

<tr>
    <td>Example Member</td>
    <td>0000000000000</td>
    <td>0712345678</td>
    <td>Family</td>
</tr>

</table>

</body>
