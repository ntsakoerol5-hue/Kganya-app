<!DOCTYPE html>
<html>
<head>
    <title>Funeral Bookings</title>
</head>
<body>

<h1>Funeral Bookings</h1>

<form>
    <label>Deceased Name</label><br>
    <input type="text"><br><br>

    <label>Family Contact</label><br>
    <input type="text"><br><br>

    <label>Funeral Date</label><br>
    <input type="date"><br><br>

    <label>Funeral Time</label><br>
    <input type="time"><br><br>

    <label>Venue</label><br>
    <input type="text"><br><br>

    <button type="submit">Book Funeral</button>
</form>

<hr>

<h2>Upcoming Funerals</h2>

<table border="1">
<tr>
    <th>Deceased</th>
    <th>Date</th>
    <th>Time</th>
    <th>Venue</th>
</tr>

<tr>
    <td>Example Name</td>
    <td>25/07/2026</td>
    <td>10:00</td>
    <td>Burgersfort</td>
</tr>

</table>

</body>
</html>
